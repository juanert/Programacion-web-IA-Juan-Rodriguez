<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .centrar{
        display: flex;
        flex-direction: column;
        /*Maneja el eje primario del elemento
        Puedes usar start(inicio), end(final) y center(centrado)
        */
        justify-content: center;
        /*Maneja el eje secundario*/
        align-items: center;
        gap: 20px;
        background-color: darkgreen;
        height: 100vh;
        color: white;
        /*width: 100vw;
        vh = viewport height (alto del navegador)
        vw = viewport width (ancho del navegador)
        */
      }
    </style>
  </head>
  <body>
    <section class="centrar">
      <h1>Este es un titular</h1>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Inventore sequi
        necessitatibus quos aliquam voluptatibus ex repellat sunt nisi nihil
        recusandae mollitia quidem, alias eos iure suscipit non accusantium
        porro velit.
      </p>
      <button>Presioname</button>
    </section>
  </body>
</html>

  abajo de este, debe de haber una fila con tres columnas, entre cada columna debe
  de haber un gap de 20px

  Cada columna debe de tener una imagen, un titular, un parrafo y boton el contenido de
